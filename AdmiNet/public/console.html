<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AdmiNetwork — SSH Terminal</title>
  <script src="./libs/jquery-3.7.1.js"></script>
  <link rel="stylesheet" href="css/styles2.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css">
</head>
<body>
  <div id="ssh-panel" class="ssh-panel hidden" role="dialog" aria-label="SSH panel">
    <header class="topbar">
      <div class="brand">
        <div class="logo">NP</div>
        <div class="title">AdminetWork</div>
      </div>
      <div class="top-actions">
        <div class="userinfo">user@host</div>
      </div>
    </header>

    <div class="container">
      <aside class="sidebar">
        <h3>Information</h3>
        <ul class="info-list">
          <li><strong>Open ports</strong><br/><span id="ports">22, 80, 443</span></li>
          <li><strong>Services</strong><br/><span id="services">SSH, HTTP, HTTPS</span></li>
          <li><strong>OS</strong><br/><span id="os">Debian 12</span></li>
        </ul>
      </aside>

      <main class="main">
        <div class="controls-row">
          <div class="left-controls">

          </div>
          <div class="ip-display">IP: <span id="device-ip">192.168.1.10</span></div>
        </div>

        <div class="terminal-area">
          <div id="xterm" class="terminal-screen"></div>
        </div>

      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
  <script type="module" src="js/terminal.js"></script>
  <script>
    (async function () {
      const token = sessionStorage.getItem('auth_token');
      if (!token) { window.location.href = 'login.html'; return; }
      const res = await fetch('/auth/verify', {
        method: 'POST',
        headers: { 'x-auth-token': token }
      });
      const data = await res.json();
      if (!data.success) { window.location.href = 'login.html'; return; }
    })();
  </script>
</body>
</html>
